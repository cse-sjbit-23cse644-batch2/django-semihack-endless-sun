{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CampusVault{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background-color:#1B2A4A;">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">
      <span style="color:#2A9D8F;">Campus</span>Vault
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <div class="navbar-nav ms-auto gap-1">
        <a class="nav-link px-3 rounded {% if request.path == '/register/' %}active bg-white bg-opacity-10{% endif %}"
           href="/register/">Register</a>
        <a class="nav-link px-3 rounded {% if request.path == '/dashboard/' %}active bg-white bg-opacity-10{% endif %}"
           href="/dashboard/">Dashboard</a>
      </div>
    </div>
  </div>
</nav>

<div class="container flex-grow-1">
  {% block content %}{% endblock %}
</div>

<footer class="mt-5 py-3 text-center text-muted small" style="border-top:1px solid #dee2e6;">
  CampusVault &mdash; Event & Placement Management &nbsp;|&nbsp;
  <span style="color:#2A9D8F;">&#9679;</span> All records verified on-chain via hash
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
